<!DOCTYPE html>
<html>
<head>
    <title>H.I.R.E. | Admin panel</title>
    <style>
        body { background: #0b1426; color: white; font-family: 'Poppins', sans-serif; display: flex; margin: 0; height: 100vh; }
        .side { width: 300px; background: rgba(255, 255, 255, 0.03); padding: 30px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .brand { font-size: 32px; font-weight: bold; background: linear-gradient(45deg, #00ff88, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .btn { background: linear-gradient(45deg, #00ff88, #00c6ff); border: none; padding: 15px; border-radius: 8px; color: #0b1426; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #00c6ff; }
        .badge { background: rgba(0, 198, 255, 0.1); border: 1px solid #00c6ff; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #00c6ff; }
    </style>
</head>
<body onload="fetchData()">
    <div class="side">
        <div class="brand">H.I.R.E.</div>
        <p style="color:#a1a6b4; font-size: 14px; margin-top: 0;">System Admin Console</p>
        
        <button class="btn" onclick="syncEmail()">🔄 Run IMAP Sync</button>
        
        <div style="margin-top: auto;">
            <a href="/logout" style="color: #ff4b4b; text-decoration: none; font-weight: bold;">← Terminate Session</a>
        </div>
    </div>
    <div class="main">
        <h1 style="color: #00ff88; margin-top: 0;">  View Dashboard</h1>
        
        <div class="glass">
            <h3>System Activity Logs (JSON)</h3>
            <table>
                <thead><tr><th>Timestamp</th><th>User</th><th>Role</th><th>Action</th><th>Details</th></tr></thead>
                <tbody id="logsTable"></tbody>
            </table>
        </div>
        
        <div style="display: flex; gap: 20px;">
            <div class="glass" style="flex: 1;">
                <h3>Users Database</h3>
                <table><tbody id="usersTable"></tbody></table>
            </div>
            <div class="glass" style="flex: 1;">
                <h3>Active Jobs</h3>
                <table><tbody id="jobsTable"></tbody></table>
            </div>
        </div>
    </div>
    
    <script>
        async function fetchData() {
            const r = await fetch('/api/god_view'); const d = await r.json();
            
            let lHTML = ''; d.logs.slice(0, 10).forEach(l => lHTML += `<tr><td style="color:#a1a6b4;">${l.timestamp}</td><td>${l.email}</td><td><span class="badge">${l.role}</span></td><td><b style="color:white;">${l.action}</b></td><td><small>${l.details}</small></td></tr>`);
            document.getElementById('logsTable').innerHTML = lHTML;
            
            let uHTML = ''; d.users.forEach(u => uHTML += `<tr><td>${u.name}</td><td>${u.email}</td><td><span class="badge">${u.role}</span></td></tr>`);
            document.getElementById('usersTable').innerHTML = uHTML;

            let jHTML = ''; d.jobs.forEach(j => jHTML += `<tr><td><b style="color:white;">${j.title}</b><br><small style="color:#00ff88;">Subject ID: JOB-${j.id}</small></td><td style="color:#a1a6b4;">${j.hr_email}</td></tr>`);
            document.getElementById('jobsTable').innerHTML = jHTML;
        }
        
        async function syncEmail() {
            alert("Initiating Zero-Touch Email Sync... Please wait.");
            const r = await fetch('/sync_inbox'); const d = await r.json();
            alert(d.status); fetchData();
        }
    </script>
</body>
</html>
