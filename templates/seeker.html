<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.I.R.E. | Candidate Portal</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b1121; color: white; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; padding: 30px 20px; border-right: 1px solid #1f2d4a; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .brand-title { font-size: 32px; font-weight: bold; color: #00e5ff; margin: 0; }
        .brand-sub { color: #94a3b8; font-size: 14px; margin-bottom: 40px; }
        .logout-btn { margin-top: auto; color: #ff4b4b; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .logout-btn:hover { color: #ff1c1c; }
        .upload-box { background: #131c31; border: 2px dashed #00e5ff; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .btn { background: #00e5ff; color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn:hover { box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }
        .notif-box { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid #00e676; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #131c31; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #1f2d4a; }
        th { color: #00e5ff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 class="brand-title">H.I.R.E.</h1>
        <p class="brand-sub">Candidate Workspace</p>
        <p style="color: #cbd5e1;">Welcome to the portal. Upload your resume to find your perfect match.</p>
        <a href="/logout" class="logout-btn">← Terminate Session</a>
    </div>

    <div class="main-content">
        <div class="notif-box">
            <h3 style="margin: 0 0 15px 0; color: #00e676; display: flex; align-items: center;">
                <span style="font-size: 22px; margin-right: 10px;">🔔</span> Live Job Alerts
            </h3>
            <div id="notification-list">
                <p style="color: #94a3b8; font-size: 14px;">Scanning for new opportunities...</p>
            </div>
        </div>

        <h2 style="margin-top: 0;">Upload Resume for AI Matching</h2>
        <div class="upload-box">
            <input type="file" id="resumeFile" accept=".pdf" style="color: white; font-size: 16px;">
            <br>
            <button class="btn" onclick="applySmart()">Analyze Skills & Match</button>
            <p id="apply-status" style="color: #00e676; margin-top: 15px; font-weight: bold;"></p>
        </div>

        <h3 style="color: #00e5ff; margin-top: 30px;">Live Ecosystem Openings</h3>
        <table>
            <thead><tr><th>Job Title</th><th>Company</th><th>Required Skills</th></tr></thead>
            <tbody id="public-jobs"></tbody>
        </table>
    </div>

    <script>
        // 1. Fetch Live Notifications (Auto-updates every 10 seconds!)
        function fetchJobNotifications() {
            fetch('/get_public_jobs')
            .then(res => res.json())
            .then(data => {
                let notifBox = document.getElementById('notification-list');
                let tbody = document.getElementById('public-jobs');
                notifBox.innerHTML = ''; tbody.innerHTML = '';
                
                if(data.length === 0) {
                    notifBox.innerHTML = '<p style="color: #94a3b8; font-size: 14px;">No new alerts at the moment.</p>';
                    return;
                }

                // Show Top 2 newest jobs in Notification Box
                let latestJobs = [...data].reverse().slice(0, 2); 
                latestJobs.forEach(job => {
                    notifBox.innerHTML += `
                        <div style="background: rgba(0, 230, 118, 0.1); padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid rgba(0,230,118,0.2); animation: fadeIn 0.5s;">
                            <b style="color: #fff;">🚀 New Vacancy Alert!</b><br>
                            <span style="color: #cbd5e1; font-size: 14px;">
                                <b>${job.company}</b> is urgently hiring a <span style="color: #00e5ff; font-weight: bold;">${job.title}</span>.
                            </span>
                        </div>`;
                });

                // Populate the Main Job Table
                data.forEach(job => {
                    tbody.innerHTML += `<tr><td style="font-weight:bold;">${job.title}</td><td>${job.company}</td><td>${job.skills}</td></tr>`;
                });
            });
        }

        // 2. Upload Resume Logic
        function applySmart() {
            let fileInput = document.getElementById('resumeFile');
            if(fileInput.files.length === 0) { alert("Please select a PDF resume first!"); return; }
            
            let statusText = document.getElementById('apply-status');
            statusText.style.color = "#00e5ff";
            statusText.innerText = "🧠 AI is analyzing your resume... Please wait.";
            
            let fd = new FormData();
            fd.append('resume', fileInput.files[0]);
            
            fetch('/recommend', { method: 'POST', body: fd })
            .then(res => res.json())
            .then(data => {
                statusText.style.color = "#00e676";
                statusText.innerHTML = `✅ Analysis Complete! Your AI Predicted Role: <b style="color:white;">${data.predicted_role}</b><br>Your profile has been routed to matching HRs.`;
            });
        }

        window.onload = fetchJobNotifications;
        setInterval(fetchJobNotifications, 10000); // Auto refresh the alerts
    </script>
</body>
</html>
